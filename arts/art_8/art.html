<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Árbol Genealógico Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

:root{
  --bg:#f4ecd8;
  --card:#fffaf0;
  --border:#7a5a35;
  --text:#2d241a;
  --line:#6b4e2e;
  --accent:#8b6b3f;
}

/* ===== BASE ===== */
body{
  margin:0;
  background:linear-gradient(135deg,#e8dcc2,#f7f0e1);
  font-family:'Cormorant Garamond',serif;
  color:var(--text);
}

.toolbar{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  flex-wrap:wrap;
}

button, select{
  background:#6b4e2e;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-family:'Cinzel',serif;
}

button:hover{
  background:#8a6340;
}

#tree{
  width:1700px;
  margin:auto;
  padding:40px;
  background:radial-gradient(circle at center,#fff,#f4ecd8);
  border:6px solid var(--border);
  border-radius:18px;
  position:relative;
  overflow:hidden;
}

/* ===== SVG ROOT ===== */
svg#branches{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* ===== LEVELS ===== */
.level{
  display:flex;
  justify-content:center;
  gap:25px;
  margin:70px 0;
  position:relative;
}

.person{
  width:180px;
  min-height:120px;
  background:var(--card);
  border:2px solid var(--border);
  border-radius:14px;
  padding:10px;
  text-align:center;
  position:relative;
  box-shadow:0 6px 14px rgba(0,0,0,0.1);
}

.person::before{
  content:"❦";
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  background:var(--bg);
  padding:0 5px;
  color:var(--border);
}

/* avatar */
.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  margin:5px auto;
  background:#ddd;
  overflow:hidden;
  border:2px solid var(--border);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* editable */
.editable{
  outline:none;
}

.editable:empty::before{
  content:attr(data-placeholder);
  color:#999;
}

/* buttons per card */
.card-actions{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:6px;
}

.small-btn{
  font-size:10px;
  padding:4px 6px;
  border-radius:6px;
}

/* styles */
.theme-medieval .person{
  background:#fff4db;
  border-color:#7b5a2e;
}

.theme-nordic .person{
  background:#e9f2f7;
  border-color:#4c6b7a;
}

.theme-indian .person{
  background:#fff1e6;
  border-color:#b65a2a;
}

/* leaves */
.leaf{
  position:absolute;
  width:10px;
  height:10px;
  background:green;
  border-radius:50%;
  opacity:0.3;
}

</style>
</head>

<body>

<div class="toolbar">
  <button onclick="addGeneration()">➕ Generación</button>
  <button onclick="removeGeneration()">➖ Generación</button>
  <button onclick="exportPNG()">📸 Exportar PNG</button>

  <select onchange="setTheme(this.value)">
    <option value="default">Estilo clásico</option>
    <option value="theme-medieval">Medieval / Nobiliario</option>
    <option value="theme-nordic">Nórdico</option>
    <option value="theme-indian">Indio ornamental</option>
  </select>
</div>

<div id="tree">

<svg id="branches"></svg>

<div id="levels">

  <!-- nivel base -->
  <div class="level">
    <div class="person user">
      <div class="avatar">
        <input type="file" onchange="setImage(this)" />
      </div>
      <div class="editable" contenteditable data-placeholder="Tú"></div>
      <div class="editable" contenteditable data-placeholder="Profesión"></div>

      <div class="card-actions">
        <button class="small-btn" onclick="addPerson(this)">+</button>
        <button class="small-btn" onclick="removePerson(this)">-</button>
      </div>
    </div>
  </div>

</div>

</div>

<script>

/* ===================== GENERACIONES ===================== */

function addGeneration(){
  const levels = document.getElementById("levels");

  const level = document.createElement("div");
  level.className="level";

  // por defecto 2 personas
  for(let i=0;i<2;i++){
    level.appendChild(createPerson());
  }

  levels.insertBefore(level, levels.firstChild);

  drawBranches();
  addLeaves();
}

function removeGeneration(){
  const levels = document.querySelectorAll(".level");
  if(levels.length>1){
    levels[0].remove();
  }
  drawBranches();
}

/* ===================== PERSONAS ===================== */

function createPerson(){
  const div = document.createElement("div");
  div.className="person";

  div.innerHTML=`
    <div class="avatar">
      <input type="file" onchange="setImage(this)">
    </div>
    <div class="editable" contenteditable data-placeholder="Nombre"></div>
    <div class="editable" contenteditable data-placeholder="Profesión"></div>

    <div class="card-actions">
      <button class="small-btn" onclick="addPerson(this)">+</button>
      <button class="small-btn" onclick="removePerson(this)">-</button>
    </div>
  `;

  return div;
}

function addPerson(btn){
  const level = btn.closest(".level");
  level.appendChild(createPerson());
  drawBranches();
}

function removePerson(btn){
  const person = btn.closest(".person");
  const level = btn.closest(".level");

  if(level.children.length>1){
    person.remove();
  }

  drawBranches();
}

/* ===================== IMAGEN ===================== */

function setImage(input){
  const file = input.files[0];
  const img = document.createElement("img");

  img.src = URL.createObjectURL(file);

  const avatar = input.parentElement;
  avatar.innerHTML="";
  avatar.appendChild(img);
}

/* ===================== SVG BRANCHES ===================== */

function drawBranches(){
  const svg = document.getElementById("branches");
  svg.innerHTML="";

  const tree = document.getElementById("tree");
  const levels = document.querySelectorAll(".level");

  const rectTree = tree.getBoundingClientRect();

  levels.forEach((level,i)=>{
    const persons = level.querySelectorAll(".person");

    persons.forEach((p,j)=>{

      const from = p.getBoundingClientRect();

      const nextLevel = levels[i+1];
      if(!nextLevel) return;

      const targets = nextLevel.querySelectorAll(".person");

      targets.forEach(t=>{
        const to = t.getBoundingClientRect();

        const path = document.createElementNS("http://www.w3.org/2000/svg","path");

        const x1 = from.left+from.width/2-rectTree.left;
        const y1 = from.bottom-rectTree.top;

        const x2 = to.left+to.width/2-rectTree.left;
        const y2 = to.top-rectTree.top;

        const cx1 = x1;
        const cy1 = (y1+y2)/2;

        const cx2 = x2;
        const cy2 = (y1+y2)/2;

        path.setAttribute("d",
          `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`
        );

        path.setAttribute("stroke","rgba(90,60,30,0.4)");
        path.setAttribute("fill","none");

        svg.appendChild(path);

      });

    });

  });
}

/* ===================== LEAVES ===================== */

function addLeaves(){
  document.querySelectorAll(".leaf").forEach(l=>l.remove());

  const tree = document.getElementById("tree");

  for(let i=0;i<25;i++){
    const leaf = document.createElement("div");
    leaf.className="leaf";
    leaf.style.left=Math.random()*100+"%";
    leaf.style.top=Math.random()*100+"%";
    tree.appendChild(leaf);
  }
}

/* ===================== THEMES ===================== */

function setTheme(theme){
  document.getElementById("tree").className = theme;
}

/* ===================== EXPORT ===================== */

async function exportPNG(){

  const btn = document.querySelector("button");
  btn.style.display="none";

  const canvas = await html2canvas(document.getElementById("tree"),{
    scale:2,
    backgroundColor:null
  });

  btn.style.display="block";

  const a = document.createElement("a");
  a.download="arbol.png";
  a.href=canvas.toDataURL("image/png");
  a.click();
}

/* init */
addLeaves();
drawBranches();

window.addEventListener("resize",drawBranches);

</script>

</body>
</html>
