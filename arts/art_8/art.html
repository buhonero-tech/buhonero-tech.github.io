<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Árbol Genealógico</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

:root{
  --bg:#f6ecd7;
  --card:#fffaf0;
  --border:#7a5a35;
  --text:#2d241a;
  --line:#6b4e2e;
}

body{
  margin:0;
  background:linear-gradient(135deg,#e9dcc2,#f8f1e3);
  font-family:'Cormorant Garamond',serif;
  color:var(--text);
  padding:20px;
}

.toolbar{
  text-align:center;
  margin-bottom:20px;
}

button{
  background:#6b4e2e;
  color:white;
  border:none;
  padding:12px 22px;
  font-family:'Cinzel',serif;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#8a6340;
}

/* ARBOL */
#tree{
  width:1600px;
  margin:auto;
  background:radial-gradient(circle at center,#fff,transparent 70%),var(--bg);
  border:6px solid var(--border);
  border-radius:18px;
  padding:40px 20px;
  box-shadow:0 0 40px rgba(0,0,0,0.15);
  position:relative;
  overflow:hidden;
}

/* tronco decorativo */
#tree::before{
  content:"";
  position:absolute;
  left:50%;
  top:120px;
  width:6px;
  height:85%;
  background:linear-gradient(var(--line),transparent);
  transform:translateX(-50%);
  opacity:0.4;
}

.title{
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:40px;
  margin-bottom:30px;
  letter-spacing:2px;
}

/* GRID TREE */
.level{
  display:grid;
  gap:20px;
  margin-bottom:40px;
}

.level-4{ grid-template-columns:repeat(8,1fr); }
.level-3{ grid-template-columns:repeat(4,1fr); }
.level-2{ grid-template-columns:repeat(2,1fr); }
.level-1{ grid-template-columns:1fr; justify-items:center; }

/* CARD */
.person{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:14px;
  padding:12px;
  text-align:center;
  position:relative;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  min-height:90px;
}

/* ornamento */
.person::before{
  content:"❦";
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  background:var(--bg);
  padding:0 6px;
  color:var(--border);
}

/* editable */
.editable{
  outline:none;
}

.editable:empty::before{
  content:attr(data-placeholder);
  color:#999;
}

/* TEXTOS */
.name{
  font-family:'Cinzel',serif;
  font-weight:600;
  margin-bottom:6px;
}

.info{
  font-size:15px;
}

/* CONEXIONES (decorativas) */
.connector{
  height:30px;
  position:relative;
}

.connector::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:2px;
  height:30px;
  background:var(--line);
  opacity:0.5;
}

/* ramas horizontales */
.branch{
  position:relative;
}

.branch::after{
  content:"";
  position:absolute;
  top:-20px;
  left:0;
  right:0;
  height:2px;
  background:var(--line);
  opacity:0.4;
}

/* highlight usuario */
.user{
  border:3px solid var(--border);
  background:#fff3dc;
  transform:scale(1.05);
}

.legend{
  text-align:center;
  margin-top:10px;
  font-style:italic;
}

</style>
</head>

<body>

<div class="toolbar">
  <button onclick="exportar()">Guardar como PNG</button>
</div>

<div id="tree">

  <div class="title">Árbol Genealógico Familiar</div>

  <!-- BISABUELOS (8) -->
  <div class="level level-4 branch">

    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuelo 1"></div><div class="info editable" contenteditable data-placeholder="Profesión"></div></div>
    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuela 1"></div></div>

    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuelo 2"></div></div>
    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuela 2"></div></div>

    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuelo 3"></div></div>
    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuela 3"></div></div>

    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuelo 4"></div></div>
    <div class="person"><div class="name editable" contenteditable data-placeholder="Bisabuela 4"></div></div>

  </div>

  <div class="connector"></div>

  <!-- ABUELOS (4) -->
  <div class="level level-3 branch">

    <div class="person"><div class="name editable" contenteditable data-placeholder="Abuelo paterno"></div></div>
    <div class="person"><div class="name editable" contenteditable data-placeholder="Abuela paterna"></div></div>

    <div class="person"><div class="name editable" contenteditable data-placeholder="Abuelo materno"></div></div>
    <div class="person"><div class="name editable" contenteditable data-placeholder="Abuela materna"></div></div>

  </div>

  <div class="connector"></div>

  <!-- PADRES (2) -->
  <div class="level level-2 branch">

    <div class="person">
      <div class="name editable" contenteditable data-placeholder="Padre"></div>
      <div class="info editable" contenteditable data-placeholder="Profesión"></div>
    </div>

    <div class="person">
      <div class="name editable" contenteditable data-placeholder="Madre"></div>
      <div class="info editable" contenteditable data-placeholder="Profesión"></div>
    </div>

  </div>

  <div class="connector"></div>

  <!-- TÚ -->
  <div class="level level-1">

    <div class="person user">
      <div class="name editable" contenteditable data-placeholder="Tú"></div>
      <div class="info editable" contenteditable data-placeholder="Profesión"></div>
      <div class="info editable" contenteditable data-placeholder="Lugar de nacimiento"></div>
    </div>

  </div>

  <div class="legend">“La historia de la familia crece desde sus raíces”</div>

</div>

<script>
async function exportar(){

  const btn = document.querySelector("button");
  btn.style.display="none";

  const canvas = await html2canvas(document.getElementById("tree"),{
    scale:2,
    backgroundColor:null
  });

  btn.style.display="block";

  const link = document.createElement("a");
  link.download = "arbol_genealogico.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
